<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#c8922a" />
  <meta name="description" content="SongRoot — автономен агент за българска народна музика" />
  <link rel="manifest" href="/manifest.json" />
  <title>SongRoot by StaGove</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink:       #0f0a05;
      --parchment: #f5efe4;
      --gold:      #c8922a;
      --gold-dim:  #a07020;
      --ember:     #8b2e12;
      --cream:     #faf6ee;
      --muted:     #7a6e60;
      --border:    rgba(200,146,42,0.22);
      --card-bg:   rgba(255,252,245,0.04);
      --r:         10px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--ink);
      color: var(--parchment);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content:'';
      position:fixed; inset:0;
      background-image:
        radial-gradient(ellipse 60% 40% at 20% 10%, rgba(200,146,42,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 40% 60% at 80% 90%, rgba(139,46,18,0.06) 0%, transparent 60%);
      pointer-events:none; z-index:0;
    }
    .wrap { position:relative; z-index:1; max-width:860px; margin:0 auto; padding:0 20px 80px; }

    /* HEADER */
    header { text-align:center; padding:48px 0 32px; border-bottom:1px solid var(--border); margin-bottom:40px; }
    .logo-mark { width:52px; height:52px; margin:0 auto 16px; }
    .logo-mark svg { width:100%; height:100%; }
    h1 { font-family:'Playfair Display',serif; font-size:clamp(2rem,6vw,2.8rem); font-weight:900; letter-spacing:-0.02em; line-height:1.1; }
    h1 span { color:var(--gold); }
    .tagline { margin-top:8px; font-size:0.85rem; color:var(--muted); letter-spacing:0.07em; text-transform:uppercase; }
    .stagove-badge { display:inline-block; margin-top:12px; font-size:0.7rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--gold-dim); border:1px solid var(--border); padding:3px 10px; border-radius:20px; }

    /* FORM CARD */
    .form-card { background:var(--card-bg); border:1px solid var(--border); border-radius:var(--r); padding:28px 26px; backdrop-filter:blur(4px); margin-bottom:40px; }
    .form-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:22px; flex-wrap:wrap; gap:10px; }
    .form-title { font-family:'Playfair Display',serif; font-size:1.1rem; font-weight:700; color:var(--gold); }
    .btn-surprise { background:rgba(200,146,42,0.12); border:1px solid var(--border); color:var(--gold); font-family:'Inter',sans-serif; font-size:0.78rem; padding:6px 14px; border-radius:20px; cursor:pointer; letter-spacing:0.05em; transition:background 0.2s; }
    .btn-surprise:hover { background:rgba(200,146,42,0.22); }

    .row { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:14px; }
    .row-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; margin-bottom:14px; }
    @media(max-width:580px) { .row,.row-3 { grid-template-columns:1fr; } }

    .field { display:flex; flex-direction:column; gap:6px; }
    label { font-size:0.72rem; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); }
    select, input[type="number"], input[type="text"] {
      width:100%; background:rgba(245,239,228,0.05); border:1px solid var(--border);
      border-radius:6px; color:var(--parchment); font-family:'Inter',sans-serif;
      font-size:0.92rem; padding:10px 13px; appearance:none; -webkit-appearance:none;
      outline:none; transition:border-color 0.2s; cursor:pointer;
    }
    select:focus, input:focus { border-color:var(--gold); }
    select option { background:#1a1208; color:var(--parchment); }
    input::placeholder { color:var(--muted); }

    /* DIVIDER */
    .optional-divider { display:flex; align-items:center; gap:10px; margin:18px 0 16px; }
    .optional-divider span { font-size:0.7rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); white-space:nowrap; }
    .optional-divider::before, .optional-divider::after { content:''; flex:1; height:1px; background:var(--border); }

    /* BUTTONS */
    .btn-generate {
      width:100%; margin-top:6px; padding:14px;
      background:var(--gold); color:var(--ink);
      border:none; border-radius:7px; font-family:'Inter',sans-serif;
      font-size:0.92rem; font-weight:500; letter-spacing:0.04em;
      cursor:pointer; transition:background 0.2s, transform 0.1s;
      display:flex; align-items:center; justify-content:center; gap:8px;
    }
    .btn-generate:hover { background:#d9a030; }
    .btn-generate:active { transform:scale(0.99); }
    .btn-generate:disabled { background:#5a4a20; color:#8a7a50; cursor:not-allowed; }
    .spinner { width:15px; height:15px; border:2px solid rgba(15,10,5,0.3); border-top-color:var(--ink); border-radius:50%; animation:spin 0.7s linear infinite; display:none; }
    .loading .spinner { display:block; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* FEATURED PLAYLISTS */
    .section-label { font-size:0.72rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); margin-bottom:14px; }
    .featured-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(180px, 1fr)); gap:12px; margin-bottom:44px; }
    .featured-card {
      background:var(--card-bg); border:1px solid var(--border); border-radius:var(--r);
      padding:16px 16px 14px; text-decoration:none; color:inherit;
      transition:border-color 0.2s, background 0.2s; display:block;
    }
    .featured-card:hover { border-color:var(--gold); background:rgba(200,146,42,0.07); }
    .featured-region { font-size:0.68rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--gold-dim); margin-bottom:6px; }
    .featured-title { font-family:'Playfair Display',serif; font-size:0.95rem; font-weight:700; margin-bottom:5px; line-height:1.3; }
    .featured-desc { font-size:0.75rem; color:var(--muted); line-height:1.5; }
    .featured-yt { display:inline-flex; align-items:center; gap:5px; margin-top:10px; font-size:0.72rem; color:var(--gold); }
    .featured-yt svg { width:13px; height:13px; fill:#ff4444; }

    /* RESULT */
    #result { margin-top:10px; }
    .playlist-header { border-bottom:1px solid var(--border); padding-bottom:18px; margin-bottom:22px; }
    .playlist-meta { font-size:0.72rem; color:var(--gold); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:7px; }
    .playlist-title { font-family:'Playfair Display',serif; font-size:1.45rem; font-weight:700; line-height:1.2; margin-bottom:9px; }
    .playlist-desc { font-size:0.85rem; color:var(--muted); line-height:1.65; }
    .occasion-note { display:inline-block; margin-top:10px; font-size:0.75rem; color:var(--ember); background:rgba(139,46,18,0.12); border:1px solid rgba(139,46,18,0.25); padding:3px 11px; border-radius:20px; }

    /* READY PLAYLISTS STRIP */
    .ready-playlists { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:24px; }
    @media(max-width:520px) { .ready-playlists { grid-template-columns:1fr; } }
    .ready-pl-card {
      background:rgba(255,0,0,0.07); border:1px solid rgba(255,80,80,0.2);
      border-radius:8px; padding:13px 14px; text-decoration:none; color:inherit;
      transition:background 0.2s; display:flex; flex-direction:column; gap:4px;
    }
    .ready-pl-card:hover { background:rgba(255,0,0,0.13); }
    .ready-pl-label { font-size:0.65rem; letter-spacing:0.1em; text-transform:uppercase; color:#ff6666; }
    .ready-pl-name { font-size:0.85rem; font-weight:500; line-height:1.3; }
    .ready-pl-icon { display:flex; align-items:center; gap:5px; margin-top:5px; font-size:0.72rem; color:#ff8888; }
    .ready-pl-icon svg { width:14px; height:14px; fill:#ff4444; }

    /* SONGS */
    .songs-list { display:flex; flex-direction:column; gap:10px; }
    .song-card {
      background:var(--card-bg); border:1px solid var(--border); border-radius:var(--r);
      padding:16px 18px; display:flex; align-items:center; gap:14px;
      transition:border-color 0.2s, background 0.2s; text-decoration:none; color:inherit;
    }
    .song-card:hover { border-color:var(--gold); background:rgba(200,146,42,0.06); }
    .song-num { font-family:'Playfair Display',serif; font-size:1.3rem; font-weight:900; color:var(--border); min-width:26px; text-align:center; transition:color 0.2s; }
    .song-card:hover .song-num { color:var(--gold); }
    .song-info { flex:1; min-width:0; }
    .song-title { font-family:'Playfair Display',serif; font-size:0.97rem; font-weight:700; margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .song-artist { font-size:0.78rem; color:var(--gold-dim); margin-bottom:3px; }
    .song-desc { font-size:0.75rem; color:var(--muted); line-height:1.5; }
    .yt-icon { flex-shrink:0; width:30px; height:30px; background:rgba(255,0,0,0.15); border-radius:6px; display:flex; align-items:center; justify-content:center; }
    .yt-icon svg { width:14px; height:14px; fill:#ff4444; }

    /* ERROR */
    .error-msg { background:rgba(139,46,18,0.15); border:1px solid rgba(139,46,18,0.35); border-radius:7px; padding:12px 16px; font-size:0.85rem; color:#e07060; margin-top:16px; display:none; }

    /* INSTALL */
    #install-banner { display:none; position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--gold); color:var(--ink); padding:11px 22px; border-radius:30px; font-size:0.85rem; font-weight:500; cursor:pointer; box-shadow:0 4px 20px rgba(200,146,42,0.4); z-index:100; white-space:nowrap; border:none; }
    #install-banner:hover { background:#d9a030; }

    footer { text-align:center; margin-top:60px; padding-top:22px; border-top:1px solid var(--border); font-size:0.73rem; color:var(--muted); letter-spacing:0.05em; }
    footer a { color:var(--gold-dim); text-decoration:none; }
  </style>
</head>
<body>
<div class="wrap">

  <!-- HEADER -->
  <header>
    <div class="logo-mark">
      <svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="28" cy="28" r="27" stroke="#c8922a" stroke-width="1.5"/>
        <path d="M28 10 C28 10 18 20 18 30 C18 38 22 44 28 46 C34 44 38 38 38 30 C38 20 28 10 28 10Z" fill="none" stroke="#c8922a" stroke-width="1.2"/>
        <path d="M14 22 Q28 18 42 22" stroke="#c8922a" stroke-width="1" opacity="0.5"/>
        <path d="M12 32 Q28 28 44 32" stroke="#c8922a" stroke-width="1" opacity="0.5"/>
        <circle cx="28" cy="28" r="3" fill="#c8922a"/>
      </svg>
    </div>
    <h1>Song<span>Root</span></h1>
    <p class="tagline">Автономен агент за българска народна музика</p>
    <span class="stagove-badge">by StaGove</span>
  </header>

  <!-- FORM -->
  <div class="form-card">
    <div class="form-header">
      <p class="form-title">Открий своята музика</p>
      <button class="btn-surprise" onclick="surpriseMe()">🎲 Изненада ме</button>
    </div>

    <div class="row">
      <div class="field">
        <label for="region">Регион</label>
        <select id="region" onchange="updateSubRegions()">
          <option value="">— Избери —</option>
        </select>
      </div>
      <div class="field">
        <label for="subregion">Под-регион</label>
        <select id="subregion">
          <option value="">— Всички —</option>
        </select>
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label for="occasion">Повод</label>
        <select id="occasion">
          <option value="">— Избери —</option>
        </select>
      </div>
      <div class="field">
        <label for="age">Възраст</label>
        <input type="number" id="age" placeholder="напр. 68" min="10" max="100" />
      </div>
    </div>

    <div class="optional-divider"><span>Допълнително (незадължително)</span></div>

    <div class="row-3">
      <div class="field">
        <label for="genre">Жанр</label>
        <select id="genre">
          <option value="">— Всички —</option>
          <option value="Народна музика">Народна</option>
          <option value="Поп-фолк">Поп-фолк</option>
          <option value="Естрада">Естрада</option>
          <option value="Класическа музика">Класика</option>
          <option value="Джаз">Джаз</option>
        </select>
      </div>
      <div class="field">
        <label for="decade">Десетилетие</label>
        <select id="decade">
          <option value="">— Всички —</option>
          <option value="60-те години">60-те</option>
          <option value="70-те години">70-те</option>
          <option value="80-те години">80-те</option>
          <option value="90-те години">90-те</option>
          <option value="2000-те години">2000-те</option>
        </select>
      </div>
      <div class="field">
        <label for="artists">Любими изпълнители</label>
        <input type="text" id="artists" placeholder="напр. Валя Балканска" />
      </div>
    </div>

    <button class="btn-generate" id="btn" onclick="generatePlaylist()">
      <div class="spinner" id="spinner"></div>
      <span id="btn-text">Генерирай плейлист</span>
    </button>
    <div class="error-msg" id="error"></div>
  </div>

  <!-- FEATURED PLAYLISTS -->
  <p class="section-label">Препоръчани плейлисти по региони</p>
  <div class="featured-grid" id="featured-grid"></div>

  <!-- RESULT -->
  <div id="result"></div>

  <footer>
    <p>SongRoot by <a href="#">StaGove</a> &nbsp;·&nbsp; Автономен AI агент &nbsp;·&nbsp; Безплатно</p>
  </footer>
</div>

<button id="install-banner" onclick="installPWA()">⬇ Инсталирай като приложение</button>

<script>
  const YT_SVG = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.6 12 3.6 12 3.6s-7.5 0-9.4.5A3 3 0 0 0 .5 6.2 31 31 0 0 0 0 12a31 31 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.5 9.4.5 9.4.5s7.5 0 9.4-.5a3 3 0 0 0 2.1-2.1A31 31 0 0 0 24 12a31 31 0 0 0-.5-5.8z"/><polygon points="9.7 15.5 15.8 12 9.7 8.5 9.7 15.5" fill="#0f0a05"/></svg>`;

  const FEATURED = [
    { region:'Родопи', title:'Двугласни родопски песни', desc:'Архаични мелодии и дълбоки традиции', q:'родопски народни песни двугласни плейлист' },
    { region:'Тракия', title:'Тракийски хора и песни', desc:'Бързи ритми, жизнени мелодии', q:'тракийски народни песни хоро плейлист' },
    { region:'Шоплук', title:'Шопски песни 7/8', desc:'Нечетни ритми, рязки интонации', q:'шопски народни песни плейлист' },
    { region:'Добруджа', title:'Добруджански напеви', desc:'Широки, величествени мелодии', q:'добруджански народни песни плейлист' },
    { region:'Пирин', title:'Пирински многогласия', desc:'Македонски ритми 7/8 и 9/8', q:'пирински народни песни плейлист' },
    { region:'Странджа', title:'Странджански архаики', desc:'Мистични интонации, огнени танци', q:'странджански народни песни плейлист' },
  ];

  let regionsData = [];
  let deferredPrompt = null;

  // Build featured grid
  function buildFeatured() {
    const grid = document.getElementById('featured-grid');
    grid.innerHTML = FEATURED.map(f => {
      const url = `https://www.youtube.com/results?search_query=${encodeURIComponent(f.q)}&sp=EgIQAw%3D%3D`;
      return `<a class="featured-card" href="${url}" target="_blank" rel="noopener">
        <div class="featured-region">${f.region}</div>
        <div class="featured-title">${f.title}</div>
        <div class="featured-desc">${f.desc}</div>
        <div class="featured-yt">${YT_SVG} Виж в YouTube</div>
      </a>`;
    }).join('');
  }

  async function loadData() {
    const [regRes, occRes] = await Promise.all([fetch('/api/regions'), fetch('/api/occasions')]);
    regionsData = await regRes.json();
    const occasions = await occRes.json();

    const regionSel = document.getElementById('region');
    regionsData.forEach(r => {
      const o = document.createElement('option');
      o.value = r.name; o.textContent = r.name;
      regionSel.appendChild(o);
    });

    const occSel = document.getElementById('occasion');
    occasions.forEach(o => {
      const opt = document.createElement('option');
      opt.value = o; opt.textContent = o;
      occSel.appendChild(opt);
    });

    buildFeatured();
  }

  function updateSubRegions() {
    const region = document.getElementById('region').value;
    const subSel = document.getElementById('subregion');
    subSel.innerHTML = '<option value="">— Всички —</option>';
    if (!region) return;
    const found = regionsData.find(r => r.name === region);
    if (found) found.sub.forEach(s => {
      const o = document.createElement('option');
      o.value = s; o.textContent = s;
      subSel.appendChild(o);
    });
  }

  function surpriseMe() {
    if (!regionsData.length) return;
    const occasions = ['Рожден ден','Събиране на семейство','Просто слушане','Празник','Именен ден'];
    const genres = ['','Народна музика','Поп-фолк','Естрада'];
    const decades = ['','70-те години','80-те години','90-те години'];
    const r = regionsData[Math.floor(Math.random()*regionsData.length)];
    document.getElementById('region').value = r.name;
    updateSubRegions();
    if (r.sub.length) {
      const subSel = document.getElementById('subregion');
      subSel.value = r.sub[Math.floor(Math.random()*r.sub.length)];
    }
    document.getElementById('occasion').value = occasions[Math.floor(Math.random()*occasions.length)];
    document.getElementById('age').value = Math.floor(Math.random()*50)+30;
    document.getElementById('genre').value = genres[Math.floor(Math.random()*genres.length)];
    document.getElementById('decade').value = decades[Math.floor(Math.random()*decades.length)];
  }

  async function generatePlaylist() {
    const region = document.getElementById('region').value;
    const subRegion = document.getElementById('subregion').value;
    const occasion = document.getElementById('occasion').value;
    const age = document.getElementById('age').value;
    const genre = document.getElementById('genre').value;
    const decade = document.getElementById('decade').value;
    const artists = document.getElementById('artists').value;
    const errEl = document.getElementById('error');

    errEl.style.display = 'none';
    document.getElementById('result').innerHTML = '';

    if (!region || !occasion || !age) {
      errEl.textContent = 'Моля, попълни регион, повод и възраст.';
      errEl.style.display = 'block';
      return;
    }

    const btn = document.getElementById('btn');
    btn.disabled = true; btn.classList.add('loading');
    document.getElementById('btn-text').textContent = 'Агентът търси...';

    try {
      const res = await fetch('/api/generate-playlist', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ region, subRegion, occasion, age:parseInt(age), genre, decade, artists })
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.error);
      renderPlaylist(data.playlist, region, subRegion, occasion, age, genre, decade);
    } catch(err) {
      errEl.textContent = err.message || 'Грешка при генериране. Опитайте отново.';
      errEl.style.display = 'block';
    } finally {
      btn.disabled = false; btn.classList.remove('loading');
      document.getElementById('btn-text').textContent = 'Генерирай плейлист';
    }
  }

  function renderPlaylist(pl, region, subRegion, occasion, age, genre, decade) {
    const container = document.getElementById('result');

    // 3 ready YouTube playlist search links
    const base = `${region} ${subRegion || ''} ${occasion} народни песни`;
    const readyPlaylists = [
      { label:'Плейлист по регион', name:`${region} — народни песни`, q:`${region} народни песни плейлист` },
      { label:`По повод`, name:`${occasion} — музика`, q:`${occasion} народна музика плейлист` },
      { label: genre || 'Народна', name:`${genre || 'Народна музика'} ${decade || ''}`.trim(), q:`${genre || 'народна музика'} ${decade || ''} плейлист България`.trim() },
    ];

    const readyHTML = readyPlaylists.map(p => {
      const url = `https://www.youtube.com/results?search_query=${encodeURIComponent(p.q)}&sp=EgIQAw%3D%3D`;
      return `<a class="ready-pl-card" href="${url}" target="_blank" rel="noopener">
        <div class="ready-pl-label">${escHtml(p.label)}</div>
        <div class="ready-pl-name">${escHtml(p.name)}</div>
        <div class="ready-pl-icon">${YT_SVG} Отвори плейлист</div>
      </a>`;
    }).join('');

    const songsHTML = pl.songs.map((song,i) => `
      <a class="song-card" href="${escHtml(song.youtube_url)}" target="_blank" rel="noopener">
        <div class="song-num">${i+1}</div>
        <div class="song-info">
          <div class="song-title">${escHtml(song.title)}</div>
          <div class="song-artist">${escHtml(song.artist)}</div>
          <div class="song-desc">${escHtml(song.description)}</div>
        </div>
        <div class="yt-icon">${YT_SVG}</div>
      </a>`).join('');

    container.innerHTML = `
      <div class="playlist-header">
        <p class="playlist-meta">${escHtml(region)}${subRegion?' · '+escHtml(subRegion):''} · ${escHtml(occasion)} · ${age} год.${genre?' · '+escHtml(genre):''}${decade?' · '+escHtml(decade):''}</p>
        <h2 class="playlist-title">${escHtml(pl.playlist_title)}</h2>
        <p class="playlist-desc">${escHtml(pl.region_description)}</p>
        <span class="occasion-note">${escHtml(pl.occasion_note)}</span>
      </div>
      <p class="section-label" style="margin-bottom:12px;">Готови плейлисти в YouTube</p>
      <div class="ready-playlists">${readyHTML}</div>
      <p class="section-label" style="margin-bottom:12px;">AI препоръки — ${pl.songs.length} песни</p>
      <div class="songs-list">${songsHTML}</div>`;

    container.scrollIntoView({ behavior:'smooth', block:'start' });
  }

  function escHtml(str) {
    return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault(); deferredPrompt = e;
    document.getElementById('install-banner').style.display = 'block';
  });
  function installPWA() {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      document.getElementById('install-banner').style.display = 'none';
    });
  }

  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
  loadData();
</script>
</body>
</html>
